volumes:
  postgres-data:
    driver: local
  dataflare-data:
    driver: local

services:
  postgres:
    image: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: dataflare
      POSTGRES_USER: dataflare
      POSTGRES_PASSWORD: d4t4fl4r3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 10

  dataflare:
    image: dataflare/dataflare:0.23.0-SNAPSHOT


    # pull_policy: always
    # Note that this setup with a root user is intended for development purpose.
    # Our base image runs without root, but the Docker Compose implementation needs root to access the Docker socket
    user: "root"
    command: server standalone
    volumes:
      - dataflare-data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/dataflare-wd:/tmp/dataflare-wd
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/dataflare
            driverClassName: org.postgresql.Driver
            username: dataflare
            password: d4t4fl4r3
        kestra:
          server:
            basicAuth:
              enabled: false
              username: "admin@localhost.dev" # it must be a valid email address
              password: dataflare
          repository:
            type: postgres
          storage:
            type: local
            local:
              basePath: "/app/storage"
          queue:
            type: postgres
          tasks:
            tmpDir:
              path: /tmp/dataflare-wd/tmp
          url: http://localhost:8080/
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_started
