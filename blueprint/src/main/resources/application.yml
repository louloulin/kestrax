micronaut:
  application:
    name: kestra-blueprint
  server:
    port: 8084
    cors:
      enabled: true
      configurations:
        web:
          allowed-origins:
            - "http://localhost:3000"
            - "http://localhost:8080"
            - "http://localhost:8082"
          allowed-methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          allowed-headers:
            - "*"
          exposed-headers:
            - "*"
          allow-credentials: true
  security:
    authentication: bearer
    token:
      jwt:
        signatures:
          secret:
            generator:
              secret: "${JWT_SECRET:pleaseChangeThisSecretForProductionUse}"
        generator:
          access-token:
            expiration: 3600 # 1 hour
  data:
    pageable:
      default-page-size: 20
      max-page-size: 100

# 数据源配置
datasources:
  default:
    url: jdbc:h2:mem:devDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: ''
    schema-generate: CREATE_DROP
    dialect: H2

# JPA配置
jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: create-drop
        show_sql: false
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

# 缓存配置
caches:
  blueprints:
    maximum-size: 1000
    expire-after-write: 10m
  blueprint:
    maximum-size: 500
    expire-after-write: 5m

# 日志配置
logger:
  levels:
    io.kestra.blueprint: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# 管理端点配置
endpoints:
  all:
    enabled: true
    sensitive: false
  health:
    enabled: true
    details-visible: ANONYMOUS
  metrics:
    enabled: true
  prometheus:
    enabled: true

# OpenAPI配置
swagger-ui:
  enabled: true
  path: /swagger-ui
  
---
# 生产环境配置
micronaut:
  environments: production

# 生产数据源配置
datasources:
  default:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kestra_blueprint}
    driverClassName: org.postgresql.Driver
    username: ${DB_USERNAME:kestra}
    password: ${DB_PASSWORD:password}
    schema-generate: NONE
    dialect: POSTGRES

# 生产JPA配置
jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: validate
        show_sql: false
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

# 生产日志配置
logger:
  levels:
    io.kestra.blueprint: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

# 生产管理端点配置
endpoints:
  all:
    enabled: true
    sensitive: true
  health:
    enabled: true
    details-visible: AUTHENTICATED
  metrics:
    enabled: true
    sensitive: true
  prometheus:
    enabled: true
    sensitive: false

---
# 测试环境配置
micronaut:
  environments: test

# 测试数据源配置
datasources:
  default:
    url: jdbc:h2:mem:testDb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: ''
    schema-generate: CREATE_DROP
    dialect: H2

# 测试JPA配置
jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: create-drop
        show_sql: true
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

# 测试日志配置
logger:
  levels:
    io.kestra.blueprint: DEBUG
    org.hibernate.SQL: DEBUG