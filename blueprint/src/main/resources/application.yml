micronaut:
  application:
    name: kestra-blueprint
  server:
    port: 8084
    cors:
      enabled: true
      configurations:
        web:
          allowed-origins:
            - "http://localhost:3000"
            - "http://localhost:8080"
            - "http://localhost:8082"
          allowed-methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          allowed-headers:
            - "*"
          exposed-headers:
            - "*"
          allow-credentials: true
  security:
    enabled: false  # 暂时禁用安全认证，便于测试
  data:
    auto-create-schema: false
    pageable:
      default-page-size: 20
      max-page-size: 100
  http:
    client:
      read-timeout: 60s
      connect-timeout: 30s
      pool:
        enabled: true
        max-connections: 50
      proxy-type: http
      proxy-address: 127.0.0.1:4780

# 数据源配置
datasources:
  default:
    url: jdbc:h2:file:./data/blueprint;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: ''
    dialect: H2

# Flyway配置
flyway:
  datasources:
    default:
      enabled: true
      locations: classpath:db/migration

# Micronaut Data配置已合并到上面的micronaut配置中

# 缓存配置
caches:
  blueprints:
    maximum-size: 1000
    expire-after-write: 10m
  blueprint:
    maximum-size: 500
    expire-after-write: 5m

# GitHub API配置
github:
  api:
    token: ${GITHUB_TOKEN:}
    base-url: https://api.github.com
    timeout: 30s
    retry-attempts: 3
    retry-delay: 2s

# 日志配置
logger:
  levels:
    io.kestra.blueprint: DEBUG
    io.micronaut.data.query: DEBUG

# 管理端点配置
endpoints:
  all:
    enabled: true
    sensitive: false
  health:
    enabled: true
    details-visible: ANONYMOUS
  metrics:
    enabled: true
  prometheus:
    enabled: true

# OpenAPI配置
swagger-ui:
  enabled: true
  path: /swagger-ui
  
---
# 生产环境配置
micronaut:
  environments: production

# 生产数据源配置
datasources:
  default:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kestra_blueprint}
    driverClassName: org.postgresql.Driver
    username: ${DB_USERNAME:kestra}
    password: ${DB_PASSWORD:password}
    schema-generate: NONE
    dialect: POSTGRES

# 生产环境不需要JPA配置，使用Micronaut Data JDBC

# 生产日志配置
logger:
  levels:
    io.kestra.blueprint: INFO
    io.micronaut.data.query: WARN

# 生产管理端点配置
endpoints:
  all:
    enabled: true
    sensitive: true
  health:
    enabled: true
    details-visible: AUTHENTICATED
  metrics:
    enabled: true
    sensitive: true
  prometheus:
    enabled: true
    sensitive: false

---
# 测试环境配置
micronaut:
  environments: test

# 测试数据源配置
datasources:
  default:
    url: jdbc:h2:file:./data/blueprint-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: ''
    schema-generate: CREATE_DROP
    dialect: H2

# 测试环境不需要JPA配置，使用Micronaut Data JDBC

# 测试日志配置
logger:
  levels:
    io.kestra.blueprint: DEBUG
    io.micronaut.data.query: DEBUG