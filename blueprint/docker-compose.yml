version: '3.8'

services:
  blueprint:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kestra-blueprint
    ports:
      - "8084:8084"
    environment:
      - MICRONAUT_ENVIRONMENTS=docker
      - MICRONAUT_SERVER_PORT=8084
      - DATASOURCES_DEFAULT_URL=jdbc:h2:file:/app/data/blueprint;DB_CLOSE_DELAY=-1
      - DATASOURCES_DEFAULT_DRIVER_CLASS_NAME=org.h2.Driver
      - DATASOURCES_DEFAULT_USERNAME=sa
      - DATASOURCES_DEFAULT_PASSWORD=
      - JAVA_OPTS=-Xmx512m -Xms256m
    volumes:
      - blueprint_data:/app/data
      - blueprint_logs:/app/logs
    networks:
      - kestra-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  blueprint_data:
    driver: local
  blueprint_logs:
    driver: local

networks:
  kestra-network:
    driver: bridge
